<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Projects — Kunihiro Takeoka</title>
<meta name="description" content="Project list for Kunihiro Takeoka." />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta property="og:title" content="Projects — Kunihiro Takeoka" />
<meta property="og:description" content="Project list for Kunihiro Takeoka." />
<meta property="og:url" content="https://kuni88.github.io/project/" />
<meta property="og:image" content="https://kuni88.github.io/media/icon_hu0b7a4cb9992c9ac0e91bd28ffd38dd00_9727_512x512_fill_lanczos_center_3.png" />
<meta property="twitter:card" content="summary" />
<meta name="theme-color" content="#7c3aed" />
<link rel="canonical" href="https://kuni88.github.io/project/" />
<link rel="icon" type="image/png" href="/media/icon_hu0b7a4cb9992c9ac0e91bd28ffd38dd00_9727_32x32_fill_lanczos_center_3.png" />
<link rel="apple-touch-icon" type="image/png" href="/media/icon_hu0b7a4cb9992c9ac0e91bd28ffd38dd00_9727_180x180_fill_lanczos_center_3.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f8f6f2; --bg-2: #f1ede8; --bg-card: #ffffff;
    --fg: #1c1a17; --fg-2: #3d3a34; --fg-dim: #7a7570;
    --border: #e3ddd6; --border-2: #ece8e2;
    --accent: #6d28d9; --accent-soft: #ede9fe; --accent-text: #4c1d95;
  }
  [data-theme="dark"] {
    --bg: #1a1816; --bg-2: #211f1c; --bg-card: #252220;
    --fg: #f0ece6; --fg-2: #c8c0b4; --fg-dim: #857e75;
    --border: #302c28; --border-2: #2a2622;
    --accent: #a78bfa; --accent-soft: #3b2d6e; --accent-text: #c4b5fd;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: 'Geist', system-ui, -apple-system, sans-serif; }
  * { box-sizing: border-box; }
  a { color: inherit; }
  .mono { font-family: 'JetBrains Mono', 'Fira Mono', monospace; }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(2.4);opacity:0} }
  @keyframes fadeInUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .card-hover { transition: border-color 180ms, transform 180ms, box-shadow 180ms; }
  .card-hover:hover { border-color: var(--accent) !important; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
  [data-theme="dark"] .card-hover:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.3); }
  .link-arrow { transition: transform 180ms; display: inline-block; }
  a:hover .link-arrow { transform: translateX(2px); }
  .fade-in > * { animation: fadeInUp 400ms ease both; }
  .fade-in > *:nth-child(2){animation-delay:40ms}
  .fade-in > *:nth-child(3){animation-delay:80ms}
  .fade-in > *:nth-child(4){animation-delay:120ms}
  .fade-in > *:nth-child(5){animation-delay:160ms}
  @media (max-width:900px) {
    .layout { grid-template-columns: 1fr !important; }
    .sidebar { position:static !important; height:auto !important; border-right:none !important; border-bottom:1px solid var(--border); }
  }
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="/js/site-data.js"></script>
<script type="text/babel">
const { PROFILE, PROJECTS, LINKS, ACCENT_MAP } = window;

const T = {
  en: {
    mission:"mission", now:"now", interests:"interests", contact:"contact", status:"status",
    based:"based", toggle_theme:"toggle theme",
    section:"Projects", heading:"Selected builds, demos, and competition work.",
    sub:"Same data, same visual system as the main page, but focused on project browsing.",
    footer:"Last indexed 2026-04-19.", back:"home →", latest:"latest"
  },
  ja: {
    mission:"ミッション", now:"現在", interests:"関心領域", contact:"連絡先", status:"状態",
    based:"拠点", toggle_theme:"テーマ切替",
    section:"プロジェクト一覧", heading:"制作物・デモ・競技実績を一覧化。",
    sub:"メインページと同じデータと見た目を保ちながら、プロジェクト閲覧に寄せています。",
    footer:"最終更新 2026-04-19.", back:"home →", latest:"最新"
  }
};

function applyAccent(accent, theme) {
  const p = ACCENT_MAP[accent] || ACCENT_MAP.purple;
  const [a, as, at] = theme === "dark" ? p.dark : p.light;
  const r = document.documentElement;
  r.style.setProperty("--accent", a);
  r.style.setProperty("--accent-soft", as);
  r.style.setProperty("--accent-text", at);
}

function Icon({ name, size = 16, style }) {
  const s = { width:size, height:size, display:"inline-block", verticalAlign:"middle", flexShrink:0, ...style };
  const svg = (paths) => (
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" style={s}>
      {paths}
    </svg>
  );
  switch (name) {
    case "github": return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style={s}><path d="M12 .5C5.65.5.5 5.65.5 12.02c0 5.1 3.29 9.42 7.86 10.96.58.1.79-.25.79-.56 0-.28-.01-1.02-.02-2-3.2.7-3.87-1.54-3.87-1.54-.52-1.33-1.28-1.69-1.28-1.69-1.05-.72.08-.71.08-.71 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.71 1.26 3.37.96.1-.75.4-1.27.73-1.56-2.56-.29-5.25-1.28-5.25-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.47.11-3.06 0 0 .97-.31 3.18 1.18a11.06 11.06 0 0 1 5.8 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.77.11 3.06.74.81 1.19 1.84 1.19 3.1 0 4.43-2.7 5.41-5.27 5.69.41.36.78 1.06.78 2.14 0 1.55-.01 2.8-.01 3.18 0 .31.21.67.8.55 4.56-1.54 7.85-5.86 7.85-10.96C23.5 5.65 18.35.5 12 .5z"/></svg>;
    case "scholar": return svg(<><path d="M12 3 2 9l10 6 7.5-4.5"/><path d="M19.5 10.5V15"/><path d="M6 12v3c0 1.5 3 3 6 3s6-1.5 6-3v-3"/></>);
    case "dblp": return svg(<><rect x="4" y="4" width="16" height="6" rx="1.5"/><rect x="4" y="14" width="16" height="6" rx="1.5"/><circle cx="7.5" cy="7" r="0.8" fill="currentColor"/><circle cx="7.5" cy="17" r="0.8" fill="currentColor"/></>);
    case "twitter": return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style={s}><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.259 5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>;
    case "mail": return svg(<><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></>);
    case "hammer": return svg(<><path d="M14 4l6 6-3 3-2-2-8 8-3-3 8-8-2-2z"/></>);
    case "sparkle": return svg(<><path d="M12 3v6M12 15v6M3 12h6M15 12h6"/><path d="m6 6 3 3M15 15l3 3M18 6l-3 3M9 15l-3 3"/></>);
    case "bot": return svg(<><rect x="7" y="8" width="10" height="9" rx="2"/><path d="M12 3v3M9 17v2M15 17v2M4 11h3M17 11h3"/><circle cx="10" cy="12" r="1" fill="currentColor"/><circle cx="14" cy="12" r="1" fill="currentColor"/></>);
    case "trophy": return svg(<><path d="M8 4h8v5a4 4 0 0 1-8 0V4z"/><path d="M8 6H5v2a3 3 0 0 0 3 3M16 6h3v2a3 3 0 0 1-3 3"/><path d="M10 14h4v3h2v3H8v-3h2z"/></>);
    case "wine": return svg(<><path d="M7 3h10l-1 7a4 4 0 0 1-8 0z"/><path d="M12 14v6M8 20h8"/></>);
    case "sticker": return svg(<><path d="M4 4h12v12l-4 4H4z"/><path d="M16 16h-4v4"/></>);
    case "code": return svg(<><path d="m8 8-4 4 4 4M16 8l4 4-4 4M14 5l-4 14"/></>);
    case "moon": return svg(<><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></>);
    case "sun": return svg(<><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></>);
    default: return null;
  }
}

function PulseDot() {
  return (
    <span style={{position:"relative",display:"inline-block",width:8,height:8,flexShrink:0}}>
      <span style={{position:"absolute",inset:0,borderRadius:"50%",background:"var(--accent)",animation:"pulse 1.8s ease-in-out infinite"}} />
      <span style={{position:"absolute",inset:0,borderRadius:"50%",background:"var(--accent)"}} />
    </span>
  );
}
function Chip({ children, style }) {
  return <span className="mono" style={{display:"inline-block",padding:"1px 8px",fontSize:11,background:"var(--bg-2)",color:"var(--fg-2)",border:"1px solid var(--border)",borderRadius:999,...style}}>{children}</span>;
}
function Label({ children }) {
  return <div className="mono" style={{fontSize:11,letterSpacing:0.5,textTransform:"uppercase",color:"var(--fg-dim)",marginBottom:8}}>{children}</div>;
}
function Sidebar({ lang, setLang, theme, setTheme }) {
  const p = PROFILE;
  const t = T[lang];
  return (
    <aside className="sidebar" style={{background:"var(--bg-2)",borderRight:"1px solid var(--border)",padding:"24px 22px",position:"sticky",top:0,height:"100vh",overflowY:"auto",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end",marginBottom:20}}>
        <button onClick={() => setTheme(theme==="dark"?"light":"dark")} title={t.toggle_theme}
          style={{background:"transparent",color:"var(--fg-2)",border:"1px solid var(--border)",padding:"3px 8px",borderRadius:6,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
          <Icon name={theme==="dark"?"sun":"moon"} size={13} />
        </button>
        <button onClick={() => setLang(lang==="en"?"ja":"en")}
          style={{background:"transparent",color:"var(--fg-2)",border:"1px solid var(--border)",padding:"3px 10px",borderRadius:6,fontFamily:"'JetBrains Mono',monospace",fontSize:11,cursor:"pointer",letterSpacing:0.4}}>
          {lang==="en"?"EN":"JA"}
        </button>
      </div>

      <div style={{display:"flex",alignItems:"flex-start",gap:14}}>
        <div style={{position:"relative",flexShrink:0}}>
          <img src="/authors/admin/avatar.png" alt={p.name.en}
            style={{width:76,height:76,borderRadius:14,objectFit:"cover",display:"block",border:"1px solid var(--border)"}} />
          <span style={{position:"absolute",right:-4,bottom:-4,display:"flex",alignItems:"center",justifyContent:"center",width:20,height:20,borderRadius:"50%",background:"var(--bg-2)",border:"2px solid var(--bg-2)"}}>
            <PulseDot />
          </span>
        </div>
        <div style={{minWidth:0,paddingTop:2}}>
          <div style={{fontSize:18,fontWeight:600,letterSpacing:-0.3,lineHeight:1.2}}>{p.name[lang]}</div>
          <div className="mono" style={{color:"var(--fg-dim)",fontSize:11.5,marginTop:2}}>/{p.handle}</div>
          <div style={{color:"var(--fg-2)",fontSize:13,marginTop:5}}>{p.role[lang]}</div>
          <div style={{fontSize:12,color:"var(--fg-dim)",marginTop:2,lineHeight:1.35}}>{p.org[lang]}</div>
        </div>
      </div>

      <div style={{marginTop:18,padding:"11px 13px",background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:10}}>
        <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:7}}>
          <PulseDot />
          <span className="mono" style={{fontSize:10,letterSpacing:0.6,textTransform:"uppercase",color:"var(--fg-dim)"}}>{t.mission}</span>
        </div>
        <div style={{fontSize:14,color:"var(--fg)",fontWeight:500,lineHeight:1.5}}>{p.mission[lang]}</div>
      </div>

      <div style={{marginTop:16}}><Label>{t.now}</Label>
        <ul style={{margin:0,padding:0,listStyle:"none"}}>
          {p.now[lang].map((n,i) => (
            <li key={i} style={{padding:"5px 0",borderTop:i===0?"none":"1px dashed var(--border)",fontSize:12.5,display:"flex",gap:8}}>
              <span style={{color:"var(--accent)",lineHeight:1.5,flexShrink:0}}>▸</span>
              <span style={{lineHeight:1.45}}>{n}</span>
            </li>
          ))}
        </ul>
      </div>

      <div style={{marginTop:16}}><Label>{t.interests}</Label>
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
          {p.interests[lang].map(i => <Chip key={i}>{i}</Chip>)}
        </div>
      </div>

      <div style={{marginTop:16}}><Label>{t.status}</Label>
        <div style={{fontSize:12.5,color:"var(--fg-2)",lineHeight:1.5}}>
          <div><span className="mono" style={{color:"var(--fg-dim)",marginRight:6,fontSize:11}}>{t.based}</span>{p.location}</div>
          <div style={{marginTop:4,display:"flex",gap:7,alignItems:"center"}}>
            <PulseDot /><span style={{fontSize:12}}>{p.status[lang]}</span>
          </div>
        </div>
      </div>

      <div style={{marginTop:16}}><Label>{t.contact}</Label>
        {LINKS.map((l,i) => (
          <a key={l.label} href={l.url} target={l.url.startsWith("mailto")?"_self":"_blank"} rel="noopener"
            style={{display:"flex",alignItems:"center",gap:9,padding:"7px 0",textDecoration:"none",color:"inherit",fontSize:12.5,borderTop:i===0?"none":"1px dashed var(--border)"}}>
            <Icon name={l.icon} size={14} style={{color:"var(--fg-dim)"}} />
            <span className="mono" style={{color:"var(--fg-2)",fontSize:11.5}}>{l.label}</span>
            <span style={{flex:1}} />
            <span style={{color:"var(--accent)",fontSize:13}} className="link-arrow">→</span>
          </a>
        ))}
      </div>

      <div style={{flex:1}} />
      <a href="/" className="mono" style={{marginTop:18,color:"var(--accent)",textDecoration:"none",fontSize:12}}>{t.back}</a>
      <div className="mono" style={{marginTop:12,fontSize:10,color:"var(--fg-dim)",letterSpacing:0.3}}>{t.footer}</div>
    </aside>
  );
}
function SectionHeader({ icon, title, count }) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
      <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:26,height:26,borderRadius:7,background:"var(--accent-soft)",color:"var(--accent-text)"}}>
        <Icon name={icon} size={14} />
      </span>
      <h2 style={{fontSize:16,fontWeight:600,margin:0,letterSpacing:-0.2}}>{title}</h2>
      <span className="mono" style={{color:"var(--fg-dim)",fontSize:11.5}}>{String(count).padStart(2,"0")}</span>
      <span style={{flex:1,height:1,background:"var(--border)"}} />
    </div>
  );
}
function ProjectCard({ p, lang, first }) {
  const title = lang==="en" ? p.title_en : p.title_ja;
  const desc = lang==="en" ? p.desc_en : p.desc_ja;
  return (
    <a href={p.url} target={p.url.startsWith("http") ? "_blank" : "_self"} rel="noopener" className="card-hover"
      style={{display:"block",background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:10,padding:"15px 18px",textDecoration:"none",color:"inherit"}}>
      <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:28,height:28,borderRadius:7,background:"var(--accent-soft)",color:"var(--accent-text)",flexShrink:0}}>
          <Icon name={p.icon||"hammer"} size={14} />
        </span>
        <span className="mono" style={{color:"var(--fg-dim)",fontSize:11.5}}>{p.year}</span>
        <Chip>{p.tag}</Chip>
        {first && <Chip style={{borderColor:"transparent",background:"#fde68a",color:"#713f12"}}>{T[lang].latest}</Chip>}
      </div>
      <div style={{marginTop:10,fontSize:15,fontWeight:500,lineHeight:1.45}}>{title}</div>
      <div style={{marginTop:7,color:"var(--fg-2)",fontSize:13,lineHeight:1.55}}>{desc}</div>
    </a>
  );
}
function Main({ lang }) {
  const t = T[lang];
  return (
    <main style={{padding:"26px 32px 80px",maxWidth:860}} className="fade-in">
      <header style={{marginBottom:28}}>
        <h1 style={{fontSize:30,fontWeight:600,letterSpacing:-0.6,margin:"0 0 6px",lineHeight:1.2,maxWidth:680}}>{t.heading}</h1>
        <div style={{color:"var(--fg-dim)",fontSize:14,maxWidth:580,lineHeight:1.5}}>{t.sub}</div>
      </header>
      <section style={{marginTop:24}}>
        <SectionHeader icon="hammer" title={t.section} count={PROJECTS.length} />
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:8}}>
          {PROJECTS.map((p, i) => <ProjectCard key={p.id} p={p} lang={lang} first={i===0} />)}
        </div>
      </section>
    </main>
  );
}
function App() {
  const [lang, setLangRaw] = React.useState(() => localStorage.getItem("kuni_lang") || "en");
  const [theme, setThemeRaw] = React.useState(() => localStorage.getItem("kuni_theme") || "light");
  const setLang = v => { setLangRaw(v); localStorage.setItem("kuni_lang", v); };
  const setTheme = v => { setThemeRaw(v); localStorage.setItem("kuni_theme", v); };
  React.useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    applyAccent("purple", theme);
  }, [theme]);
  return (
    <div className="layout" style={{display:"grid",gridTemplateColumns:"330px 1fr",minHeight:"100vh"}}>
      <Sidebar lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} />
      <Main lang={lang} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
